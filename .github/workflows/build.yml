name: Build and Package OfficeTabs

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: dotnet restore src/OfficeTabs.csproj

    - name: Build Application (Release)
      run: dotnet build src/OfficeTabs.csproj --configuration Release --no-restore

    - name: Publish Self-Contained Binary
      run: dotnet publish src/OfficeTabs.csproj -c Release -r win-x64 --self-contained false -o ./publish

    - name: Install WiX Toolset, Accept EULA and Add Extensions
      run: |
        dotnet tool install --global wix
        wix eula accept wix7
        wix extension add -g WixToolset.UI.wixext
        wix extension add -g WixToolset.BootstrapperApplications.wixext
      shell: pwsh

    - name: Compile Installer (MSI)
      run: |
        wix build -ext WixToolset.UI.wixext -out ./publish/OfficeTabsSetup.msi ./installer/Product.wxs
      shell: pwsh

    - name: Compile Bootstrapper (Setup.exe)
      run: |
        wix build -ext WixToolset.BootstrapperApplications.wixext -out ./publish/Setup.exe ./installer/Bundle.wxs
      shell: pwsh

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OfficeTabs-Setup-EXE
        path: ./publish/Setup.exe

    - name: Create GitHub Release on Tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
