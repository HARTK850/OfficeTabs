name: Build and Package OfficeTabs

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore dependencies
      run: dotnet restore src/OfficeTabs.csproj

    - name: Build Application (Release)
      run: dotnet build src/OfficeTabs.csproj --configuration Release --no-restore

    - name: Publish Binaries
      run: dotnet publish src/OfficeTabs.csproj -c Release -r win-x64 --self-contained false -o ./publish

    - name: Compile Installer (Setup.exe) using Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ./installer/setup.iss
      shell: pwsh

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OfficeTabs-Setup-EXE
        path: ./publish/Setup.exe

    - name: Create GitHub Release on Tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
